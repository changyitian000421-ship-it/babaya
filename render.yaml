services:
  - type: web
    name: shengdong-training-system
    runtime: python
    plan: free
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    buildCommand: "pip install -r requirements.txt && python -m py_compile server.py"
    startCommand: "python server.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /tmp/shengdong-data
